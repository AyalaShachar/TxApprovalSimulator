<div class="overlay" (click)="onClose()">
  <div class="dialog" (click)="$event.stopPropagation()">
    <button type="button" class="close-x" (click)="onClose()" aria-label="Close">×</button>

    <h1 class="auth-welcome">{{ 'auth.welcome' | translate }}</h1>

    <div class="tabs">
      <button type="button" class="tab" [class.active]="mode() === 'login'" (click)="setMode('login')">
        {{ 'auth.login' | translate }}
      </button>
      <button type="button" class="tab" [class.active]="mode() === 'signup'" (click)="setMode('signup')">
        {{ 'auth.signup' | translate }}
      </button>
    </div>

    <form class="auth-form" [formGroup]="form" (ngSubmit)="submit()">
      @if (mode() === 'signup') {
        <label class="field">
          <span class="field-label">{{ 'auth.fullName' | translate }}</span>
          <input type="text" formControlName="fullName" autocomplete="name" />
          @if (form.controls.fullName.touched && form.controls.fullName.invalid) {
            <span class="field-error">{{ 'auth.required' | translate }}</span>
          }
        </label>
      }

      <label class="field">
        <span class="field-label">{{ 'auth.email' | translate }}</span>
        <input type="email" formControlName="email" autocomplete="email" />
        @if (form.controls.email.touched && form.controls.email.invalid) {
          <span class="field-error">{{ 'auth.emailInvalid' | translate }}</span>
        }
      </label>

      <label class="field">
        <span class="field-label">{{ 'auth.password' | translate }}</span>
        <input type="password" formControlName="password" autocomplete="current-password" />
        @if (form.controls.password.touched && form.controls.password.hasError('minlength')) {
          <span class="field-error">{{ 'auth.passwordMin' | translate }}</span>
        }
      </label>

      @if (error()) {
        <p class="auth-error">{{ error()! | translate }}</p>
      }

      <button type="submit" class="submit-btn" [disabled]="loading() || form.invalid">
        {{ loading() ? '...' : ((mode() === 'login' ? 'auth.loginBtn' : 'auth.signupBtn') | translate) }}
      </button>
    </form>
  </div>
</div>
