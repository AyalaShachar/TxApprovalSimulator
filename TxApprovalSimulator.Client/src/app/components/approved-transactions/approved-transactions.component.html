<section class="approved">
  <h2 class="approved-title">Approved Transactions</h2>

  <div class="carousel">
    <button type="button" class="nav prev" (click)="scroll(-1)" aria-label="Previous">‹</button>

    <div class="track" #track>
      @for (tx of transactions(); track tx.id) {
        <article class="card">
          <div class="card-time"><span class="card-label">Time:</span> {{ tx.localTime }}</div>
          <div class="card-zone">Time Zone: {{ tx.region }}</div>
        </article>
      } @empty {
        <p class="empty">No approved transactions yet.</p>
      }
    </div>

    <button type="button" class="nav next" (click)="scroll(1)" aria-label="Next">›</button>
  </div>
</section>
