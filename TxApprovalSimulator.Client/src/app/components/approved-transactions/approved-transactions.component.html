<section class="approved">
  <h2 class="approved-title">{{ 'approved.heading' | translate }}</h2>

  <div class="carousel">
    <button type="button" class="nav prev" (click)="scroll(-1)" aria-label="Previous">‹</button>

    <div class="track" #track>
      @for (tx of transactions(); track tx.id) {
        <article class="card">
          <div class="card-time"><span class="card-label">{{ 'approved.time' | translate }}</span> {{ tx.localTime }}</div>
          <div class="card-zone">{{ 'approved.timezone' | translate }} {{ 'regions.' + tx.region | translate }}</div>
        </article>
      } @empty {
        <p class="empty">{{ 'approved.empty' | translate }}</p>
      }
    </div>

    <button type="button" class="nav next" (click)="scroll(1)" aria-label="Next">›</button>
  </div>
</section>
