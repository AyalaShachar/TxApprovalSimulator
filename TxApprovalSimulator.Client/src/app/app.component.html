<div class="page">
  <!-- Header -->
  <header class="header">
    <div class="logo">
      <img src="shva-logo.svg" alt="shva" class="logo-img" />
    </div>

    <div class="lang-toggle">
      <button type="button" class="lang active">ENG</button>
      <button type="button" class="lang">Hebrew</button>
    </div>
  </header>

  <main class="content">
    <!-- Simulator -->
    <section class="simulator">
      <div class="controls">
        <app-region-select
          class="region"
          [regions]="regions()"
          [(value)]="selectedRegion"
          label="Region" />

        <div class="time-card">
          <span class="time-card-label">Enter time</span>
          <div class="time-inputs">
            <div class="time-box">
              <input
                type="number"
                min="0"
                max="23"
                [value]="pad(hour())"
                (input)="setHour($any($event.target).value)" />
              <span class="unit">Hour</span>
            </div>
            <span class="colon">:</span>
            <div class="time-box">
              <input
                type="number"
                min="0"
                max="59"
                [value]="pad(minute())"
                (input)="setMinute($any($event.target).value)" />
              <span class="unit">Minute</span>
            </div>
          </div>
          <div class="time-actions">
            <img src="clock-icon.svg" alt="" class="clock-icon" />
            <div class="time-buttons">
              <button type="button" class="link-btn" (click)="cancel()">Cancel</button>
              <button type="button" class="link-btn" (click)="submit()" [disabled]="loading()">
                {{ loading() ? '...' : 'OK' }}
              </button>
            </div>
          </div>
        </div>
      </div>

      <div class="result-panel">
        <p class="sim-title">TRANSACTION SIMULATOR</p>
        <h1 class="sim-question">Will this transaction be approved?</h1>

        <img src="mockups.png" alt="" class="mockup-img" />

        @if (error()) {
          <p class="msg error">{{ error() }}</p>
        }

        @if (result(); as r) {
          @if (r.status === 'Rejected') {
            <div class="verdict rejected">
              <span class="verdict-status">{{ r.status }}</span>
              <span class="verdict-detail">Local time in {{ r.region }}: {{ r.localTime }}</span>
            </div>
          }
        }
      </div>
    </section>

    <!-- Approved transactions -->
    <app-approved-transactions [transactions]="approved()" />
  </main>
</div>
